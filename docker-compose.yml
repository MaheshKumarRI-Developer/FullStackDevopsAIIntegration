services:
  frontend:
    build: ./frontend
    image: frontend

    ports:
      - "3000:3000"

    stdin_open: true
    tty: true

    depends_on:
      - backend

  backend:
    build: ./backend
    image: backend

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    depends_on:
      - mongodb

  mongodb:
    image: mongo

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
