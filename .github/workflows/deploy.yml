name: Deploy to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd fullstackapp

            git pull origin master

            sudo docker build -t frontend ./frontend
            sudo docker build -t backend ./backend

            sudo docker stop frontend-container || true
            sudo docker rm frontend-container || true

            sudo docker stop backend-container || true
            sudo docker rm backend-container || true

            sudo docker run -d \
              -p 3000:3000 \
              --name frontend-container \
              frontend

            sudo docker run -d \
              --env-file backend/.env \
              -p 5000:5000 \
              --name backend-container \
              backend
